<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Crown CC | Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 h-screen flex items-center justify-center font-['Jost']">

    <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-md">
        <h2 class="text-3xl font-bold text-center text-slate-800 mb-2">Crown CC</h2>
        <p class="text-center text-slate-500 mb-8">Admin Dashboard Login</p>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                <input type="email" id="email" class="w-full border border-slate-200 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                <input type="password" id="password" class="w-full border border-slate-200 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <button id="loginBtn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition shadow-lg">Login to Admin</button>
        </div>
        <p id="errMsg" class="text-red-500 text-center mt-4 text-sm hidden"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        apiKey: "AIzaSyBpVtaIhpyontLBoPeyA2P7IPwaQpaDJ7o",
    	authDomain: "crowncc-e51e6.firebaseapp.com",
    	databaseURL: "https://crowncc-e51e6-default-rtdb.asia-southeast1.firebasedatabase.app/",
    	projectId: "crowncc-e51e6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('gayanruchira92@gmail.com').value;
            const password = document.getElementById('Gayan1994@').value;
            const errMsg = document.getElementById('errMsg');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "admin.html"; // සාර්ථක නම් Admin Panel එකට යන්න
            } catch (error) {
                errMsg.innerText = "Invaild User Name or Password!";
                errMsg.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
