<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crown CC | Shop Our Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Jost:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .serif { font-family: 'Cormorant Garamond', serif; }
        body { font-family: 'Jost', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <script src="navbar.js"></script>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <h1 class="serif text-4xl md:text-5xl">Our Collection</h1>
            
            <div class="flex space-x-2 overflow-x-auto pb-2 w-full md:w-auto">
                <button onclick="filterProducts('All')" class="cat-btn px-6 py-2 bg-slate-900 text-white rounded-full transition">All</button>
                <button onclick="filterProducts('Frocks')" class="cat-btn px-6 py-2 bg-white border rounded-full hover:bg-gray-100 transition">Frocks</button>
                <button onclick="filterProducts('Crop Tops')" class="cat-btn px-6 py-2 bg-white border rounded-full hover:bg-gray-100 transition">Crop Tops</button>
                <button onclick="filterProducts('Party Wear')" class="cat-btn px-6 py-2 bg-white border rounded-full hover:bg-gray-100 transition">Party Wear</button>
            </div>
        </div>

        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            <p class="col-span-full text-center py-20 text-gray-500">භාණ්ඩ පූරණය වෙමින් පවතී...</p>
        </div>
    </main>

    <div id="cart-bar" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl hidden items-center space-x-6 z-50 animate-bounce-short">
        <div class="text-sm">
            <span id="cart-count" class="font-bold text-amber-500">0</span> Items | 
            <span id="cart-total" class="font-bold">LKR 0</span>
        </div>
        <button onclick="openOrderModal()" class="bg-amber-600 px-6 py-2 rounded-full font-bold text-sm hover:bg-amber-700 transition">Checkout</button>
    </div>

    <div id="orderModal" class="fixed inset-0 bg-black/80 z-[60] hidden items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white w-full max-w-md p-8 rounded-3xl relative">
            <button onclick="closeOrderModal()" class="absolute top-4 right-6 text-2xl text-gray-400">&times;</button>
            <h2 class="serif text-3xl mb-6 text-slate-900">Delivery Details</h2>
            
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="Full Name" class="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-amber-500">
                <input type="tel" id="custPhone" placeholder="WhatsApp Number (07XXXXXXXX)" maxlength="10" class="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-amber-500">
                <textarea id="custAddress" placeholder="Delivery Address" rows="3" class="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-amber-500"></textarea>
                <input type="text" id="custCity" placeholder="Nearest City" class="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-amber-500">
                
                <div class="bg-amber-50 p-4 rounded-xl border border-dashed border-amber-300 text-center">
                    Delivery Charge: <b id="displayDelivery">LKR 0</b>
                </div>
                
                <button onclick="sendToWhatsApp()" class="w-full bg-[#25D366] text-white py-4 rounded-xl font-bold text-lg hover:bg-[#1eb956] transition">Order via WhatsApp</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, ref, onValue } from './firebase-config.js';

        let allProducts = [];
        let cart = [];
        let deliveryFee = 0;

        // Settings (Delivery Charge) ලබා ගැනීම
        onValue(ref(db, 'settings'), (snap) => {
            if(snap.val()) {
                deliveryFee = parseInt(snap.val().delivery) || 0;
                document.getElementById('displayDelivery').innerText = `LKR ${deliveryFee}`;
            }
        });

        // Products ලබා ගැනීම
        onValue(ref(db, 'products'), (snap) => {
            allProducts = [];
            snap.forEach(child => {
                allProducts.push({ id: child.key, ...child.val() });
            });
            displayProducts(allProducts);
        });

        function displayProducts(products) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.length ? '' : '<p class="col-span-full text-center py-20">මෙම ගණයට අයත් භාණ්ඩ දැනට නොමැත.</p>';
            
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 group">
                        <div class="relative overflow-hidden">
                            <img src="${p.image}" class="w-full h-[400px] object-cover transition duration-500 group-hover:scale-105" alt="${p.name}">
                            <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition duration-300 flex items-end p-6">
                                <button onclick="addToCart('${p.name}', ${p.price})" class="w-full bg-white text-slate-900 py-3 rounded-xl font-bold shadow-lg transform translate-y-4 group-hover:translate-y-0 transition duration-300">Add to Cart</button>
                            </div>
                        </div>
                        <div class="p-6 text-center">
                            <span class="text-xs font-bold text-amber-600 uppercase tracking-widest">${p.category}</span>
                            <h3 class="serif text-2xl mt-1">${p.name}</h3>
                            <p class="text-lg font-bold mt-2">LKR ${p.price.toLocaleString()}</p>
                        </div>
                    </div>`;
            });
        }

        // Filtering Logic
        window.filterProducts = (cat) => {
            const btns = document.querySelectorAll('.cat-btn');
            btns.forEach(b => {
                b.classList.remove('bg-slate-900', 'text-white');
                b.classList.add('bg-white', 'border');
            });
            event.target.classList.add('bg-slate-900', 'text-white');

            if(cat === 'All') displayProducts(allProducts);
            else displayProducts(allProducts.filter(p => p.category === cat));
        };

        // Cart Logic
        window.addToCart = (name, price) => {
            cart.push({ name, price });
            updateCartUI();
        };

        function updateCartUI() {
            const bar = document.getElementById('cart-bar');
            bar.style.display = cart.length ? 'flex' : 'none';
            document.getElementById('cart-count').innerText = cart.length;
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total').innerText = "LKR " + total.toLocaleString();
            document.getElementById('global-cart-count').innerText = cart.length;
        }

        // Modal Controls
        window.openOrderModal = () => document.getElementById('orderModal').style.display = 'flex';
        window.closeOrderModal = () => document.getElementById('orderModal').style.display = 'none';

        // WhatsApp Order
        window.sendToWhatsApp = () => {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;
            const city = document.getElementById('custCity').value;

            if(!name || !phone || !address || !city) return alert("කරුණාකර සියලු විස්තර පුරවන්න.");

            const subtotal = cart.reduce((s, i) => s + i.price, 0);
            let itemsText = cart.map((item, idx) => `${idx+1}. ${item.name} - LKR ${item.price}`).join('%0A');
            
            const msg = `*NEW ORDER - CROWN CC*%0A%0A` +
                        `*Customer:* ${name}%0A` +
                        `*Phone:* ${phone}%0A` +
                        `*Address:* ${address}, ${city}%0A%0A` +
                        `*Items:*%0A${itemsText}%0A%0A` +
                        `Subtotal: LKR ${subtotal.toLocaleString()}%0A` +
                        `Delivery: LKR ${deliveryFee}%0A` +
                        `*Total: LKR ${(subtotal + deliveryFee).toLocaleString()}*`;

            window.open(`https://wa.me/94728626128?text=${msg}`, '_blank');
        };
    </script>
</body>
</html>
