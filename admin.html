<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Crown CC | Professional Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 font-['Jost']">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-slate-900 text-white p-8 hidden lg:block">
            <h2 class="text-2xl font-bold text-amber-500 mb-10">CROWN CC</h2>
            <nav class="space-y-6">
                <div>
                    <p class="text-gray-500 text-xs uppercase font-bold mb-4 tracking-widest">Store Setup</p>
                    <button onclick="showSection('settings')" class="block w-full text-left hover:text-amber-500 transition">General Settings</button>
                </div>
                <div>
                    <p class="text-gray-500 text-xs uppercase font-bold mb-4 tracking-widest">Inventory</p>
                    <button onclick="showSection('products')" class="block w-full text-left hover:text-amber-500 transition">Manage Products</button>
                </div>
                <div>
                    <p class="text-gray-500 text-xs uppercase font-bold mb-4 tracking-widest">Feedback</p>
                    <button onclick="showSection('reviews')" class="block w-full text-left hover:text-amber-500 transition">Customer Reviews</button>
                </div>
                <button onclick="window.location.href='index.html'" class="mt-10 block text-sm text-gray-400 hover:text-white">← View Website</button>
            </nav>
        </aside>

        <main class="flex-1 p-8 md:p-12">
            
            <section id="section-settings">
                <h1 class="text-3xl font-bold mb-8 text-slate-800">General Settings</h1>
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 max-w-4xl">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Order WhatsApp Number</label>
                            <input type="text" id="setWA" placeholder="94728626128" class="w-full border border-slate-200 p-4 rounded-2xl">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Promo Announcement</label>
                            <input type="text" id="setPromo" placeholder="Free delivery for orders above LKR 5000!" class="w-full border border-slate-200 p-4 rounded-2xl">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Delivery Charge (LKR)</label>
                            <input type="number" id="setDelivery" class="w-full border border-slate-200 p-4 rounded-2xl">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Business Logo URL</label>
                            <input type="text" id="setLogo" class="w-full border border-slate-200 p-4 rounded-2xl">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-slate-700 mb-2">Main Hero Image URL</label>
                            <input type="text" id="setHero" class="w-full border border-slate-200 p-4 rounded-2xl">
                        </div>
                    </div>
                    <button onclick="saveSettings()" class="mt-8 bg-amber-600 text-white px-10 py-4 rounded-2xl font-bold hover:bg-amber-700 transition shadow-lg">Update Store Settings</button>
                </div>
            </section>

            <section id="section-products" class="hidden">
                <h1 class="text-3xl font-bold mb-8 text-slate-800">Inventory Management</h1>
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 mb-12">
                    <h2 class="text-xl font-bold mb-6">Add New Item</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                        <input type="text" id="pName" placeholder="Product Name" class="border p-4 rounded-2xl outline-none border-slate-200">
                        <input type="number" id="pPrice" placeholder="Selling Price" class="border p-4 rounded-2xl outline-none border-slate-200">
                        <input type="number" id="pOldPrice" placeholder="Old Price (Optional)" class="border p-4 rounded-2xl outline-none border-slate-200">
                        <select id="pCat" class="border p-4 rounded-2xl outline-none border-slate-200">
                            <option value="Frocks">Frocks</option>
                            <option value="Crop Tops">Crop Tops</option>
                            <option value="Party Wear">Party Wear</option>
                        </select>
                        <input type="text" id="pImg" placeholder="Image URL" class="border p-4 rounded-2xl outline-none border-slate-200">
                    </div>
                    <button onclick="addNewProduct()" class="mt-6 bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold hover:bg-black transition">Add to Inventory</button>
                </div>

                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="p-6 text-sm font-bold text-slate-600">Product</th>
                                <th class="p-6 text-sm font-bold text-slate-600">Price</th>
                                <th class="p-6 text-sm font-bold text-slate-600 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="adminProductList"></tbody>
                    </table>
                </div>
            </section>

            <section id="section-reviews" class="hidden">
                <h1 class="text-3xl font-bold mb-8 text-slate-800">Review Management</h1>
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 mb-8">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="text" id="rName" placeholder="Customer Name" class="border p-4 rounded-2xl outline-none border-slate-200">
                        <select id="rRating" class="border p-4 rounded-2xl outline-none border-slate-200">
                            <option value="5">⭐⭐⭐⭐⭐ (5 Stars)</option>
                            <option value="4">⭐⭐⭐⭐ (4 Stars)</option>
                        </select>
                        <input type="text" id="rComment" placeholder="Review Text" class="border p-4 rounded-2xl outline-none border-slate-200 md:col-span-2">
                        <button onclick="addNewReview()" class="bg-blue-600 text-white p-4 rounded-2xl font-bold hover:bg-blue-700 transition">Publish Review</button>
                    </div>
                </div>
                <div id="adminReviewList" class="space-y-4"></div>
            </section>
        </main>
    </div>

    <script type="module">
        import { db, ref, onValue, set, push, remove } from './firebase-config.js';

        // 1. Navigation
        window.showSection = (name) => {
            document.getElementById('section-settings').classList.add('hidden');
            document.getElementById('section-products').classList.add('hidden');
            document.getElementById('section-reviews').classList.add('hidden');
            document.getElementById('section-' + name).classList.remove('hidden');
        };

        // 2. Settings Load & Save
        onValue(ref(db, 'settings'), (snap) => {
            const data = snap.val();
            if(data) {
                document.getElementById('setWA').value = data.whatsapp || '';
                document.getElementById('setPromo').value = data.promo || '';
                document.getElementById('setDelivery').value = data.delivery || '';
                document.getElementById('setLogo').value = data.logo || '';
                document.getElementById('setHero').value = data.hero || '';
            }
        });

        window.saveSettings = () => {
            const settings = {
                whatsapp: document.getElementById('setWA').value,
                promo: document.getElementById('setPromo').value,
                delivery: document.getElementById('setDelivery').value,
                logo: document.getElementById('setLogo').value,
                hero: document.getElementById('setHero').value
            };
            set(ref(db, 'settings'), settings).then(() => alert("Settings Updated!"));
        };

        // 3. Inventory Management
        window.addNewProduct = () => {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const oldPrice = document.getElementById('pOldPrice').value;
            const category = document.getElementById('pCat').value;
            const image = document.getElementById('pImg').value;

            if(name && price && image) {
                push(ref(db, 'products'), {
                    name, price: parseInt(price), oldPrice: oldPrice || null,
                    category, image, date: new Date().toISOString()
                }).then(() => {
                    alert("Product Added!");
                    document.getElementById('pName').value = '';
                    document.getElementById('pPrice').value = '';
                    document.getElementById('pOldPrice').value = '';
                    document.getElementById('pImg').value = '';
                });
            } else { alert("Please fill Name, Price and Image."); }
        };

        onValue(ref(db, 'products'), (snap) => {
            const list = document.getElementById('adminProductList');
            list.innerHTML = '';
            snap.forEach(child => {
                const p = child.val();
                list.innerHTML += `
                    <tr class="border-b border-slate-50">
                        <td class="p-6 flex items-center space-x-4">
                            <img src="${p.image}" class="w-12 h-12 rounded-lg object-cover">
                            <span class="font-bold">${p.name}</span>
                        </td>
                        <td class="p-6 font-bold text-amber-600">LKR ${p.price}</td>
                        <td class="p-6 text-right">
                            <button onclick="deleteProduct('${child.key}')" class="text-red-500 font-bold">Delete</button>
                        </td>
                    </tr>`;
            });
        });

        window.deleteProduct = (id) => {
            if(confirm("Confirm Delete?")) remove(ref(db, `products/${id}`));
        };

        // 4. Reviews Management
        window.addNewReview = () => {
            const name = document.getElementById('rName').value;
            const rating = document.getElementById('rRating').value;
            const comment = document.getElementById('rComment').value;
            if(name && comment) {
                push(ref(db, 'reviews'), { name, rating: parseInt(rating), comment })
                .then(() => {
                    alert("Review Published!");
                    document.getElementById('rName').value = '';
                    document.getElementById('rComment').value = '';
                });
            }
        };

        onValue(ref(db, 'reviews'), (snap) => {
            const list = document.getElementById('adminReviewList');
            list.innerHTML = '';
            snap.forEach(child => {
                const r = child.val();
                list.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl flex justify-between items-center shadow-sm">
                        <div>
                            <span class="font-bold">${r.name}</span> <span class="text-amber-500">${'⭐'.repeat(r.rating)}</span>
                            <p class="text-gray-500 text-sm">${r.comment}</p>
                        </div>
                        <button onclick="deleteReview('${child.key}')" class="text-red-400 font-bold">Delete</button>
                    </div>`;
            });
        });

        window.deleteReview = (id) => {
            if(confirm("Delete this review?")) remove(ref(db, `reviews/${id}`));
        };
    </script>
</body>
</html>
